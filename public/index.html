<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 LOGIN PROTECTION -->
<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  alert("Please login first");
  window.location.href = "login.html";
}
</script>

<nav>
  <a href="index.html">Home</a>
  <a href="add.html">Add</a>
  <a href="cart.html">Cart</a>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">

  <marquee><h1>🛒 Products Store</h1></marquee>

  <p>Welcome: <span id="username"></span></p>

  <div id="products" class="product-grid"></div>

</div>

<script>
const API = "http://localhost:3000/products";

/* SHOW USER */
document.getElementById("username").innerText = user.email;

/* LOAD PRODUCTS */
async function loadProducts() {
  const res = await fetch(API);
  const data = await res.json();

  document.getElementById("products").innerHTML = data.map(p => `
    <div class="card">

      <!-- 🖼 PRODUCT IMAGE -->
      <img src="${p.image || 'https://via.placeholder.com/150'}" class="product-img">

      <h3>${p.name}</h3>
      <p>💰 Price: ${p.price} RWF</p>
      <p>📦 Quantity: ${p.quantity}</p>

      <!-- 🛒 CART -->
      <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})">
        Add to Cart
      </button>

      <br><br>

      <a href="edit.html?id=${p.id}">
        <button class="update">Update</button>
      </a>

      <a href="delete.html?id=${p.id}">
        <button class="delete">Delete</button>
      </a>

    </div>
  `).join("");
}

/* 🛒 CART SYSTEM */
function addToCart(id, name, price) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({ id, name, price });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart 🛒");
}


function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

loadProducts();
</script>

</body>
</html>
