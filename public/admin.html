<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
// 🔐 PROTECT PAGE
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  alert("Please login first");
  window.location.href = "login.html";
}

// only admin allowed (simple check)
if (user.role !== "admin") {
  alert("Access denied: Admin only");
  window.location.href = "index.html";
}
</script>

<nav>
  <a href="index.html">Store</a>
  <a href="add.html">Add Product</a>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">

  <h1>Admin Dashboard</h1>
  <p>Welcome Admin: <span id="email"></span></p>

  <table border="1" width="100%" style="margin-top:20px; background:white;">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="table"></tbody>
  </table>

</div>

<script>
const API = "http://localhost:3000/products";

document.getElementById("email").innerText = user.email;

async function loadProducts() {
  const res = await fetch(API);
  const data = await res.json();

  document.getElementById("table").innerHTML = data.map(p => `
    <tr>
      <td>${p.id}</td>
      <td>${p.name}</td>
      <td>${p.price}</td>
      <td>${p.quantity}</td>
      <td>
        <button onclick="editProduct(${p.id})">Edit</button>
        <button onclick="deleteProduct(${p.id})" style="background:red;">Delete</button>
      </td>
    </tr>
  `).join("");
}

async function deleteProduct(id) {
  await fetch(`${API}/${id}`, { method: "DELETE" });
  loadProducts();
}

function editProduct(id) {
  window.location.href = `edit.html?id=${id}`;
}

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

loadProducts();
</script>

</body>
</html>
