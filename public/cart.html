<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="cart.html">Cart</a>
</nav>

<div class="container">

  <h1>🛒 My Cart</h1>

  <div id="cartItems"></div>

  <h2 id="total"></h2>

  <button onclick="checkout()" class="checkout-btn">
    Checkout
  </button>

  <button onclick="clearCart()" class="delete">
    Clear Cart
  </button>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SHOW CART */
function loadCart() {
  let total = 0;

  document.getElementById("cartItems").innerHTML = cart.map((item, index) => {
    total += item.price;

    return `
      <div class="card">
        <h3>${item.name}</h3>
        <p>Price: ${item.price} RWF</p>

        <button onclick="removeItem(${index})" class="delete">
          Remove
        </button>
      </div>
    `;
  }).join("");

  document.getElementById("total").innerText =
    "Total: " + total + " RWF";
}

/* REMOVE ITEM */
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

/* CLEAR CART */
function clearCart() {
  localStorage.removeItem("cart");
  cart = [];
  loadCart();
}

/* CHECKOUT */
function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  alert("Order placed successfully 🎉");

  localStorage.removeItem("cart");
  cart = [];
  loadCart();
}

loadCart();
</script>

</body>
</html>
